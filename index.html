```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Wissal 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;min-height:100vh;
  background:#fefcf9;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
}
#bg{position:fixed;inset:0;}
</style>

</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="mithoon-phir-bhi-tumko-chaahunga_Qzp2t1rk.mp3" type="audio/mpeg">
</audio>

<canvas id="bg"></canvas>

<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
  <h1>For Wissal 💕</h1>
  <p>Click anywhere to start 💖</p>
</div>

<script>

// 🎵 PLAY MUSIC ON FIRST CLICK
document.addEventListener('click',function(){
  var music = document.getElementById('bgMusic');
  if (music.paused) {
    music.play();
  }
},{once:true});

// 🎨 simple animation
var cv=document.getElementById('bg');
var ctx=cv.getContext('2d');

function resize(){
  cv.width=window.innerWidth;
  cv.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let i=0;i<50;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*cv.width,Math.random()*cv.height,2,0,Math.PI*2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
```
